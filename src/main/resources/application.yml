# Easysearch 连接（由 EasysearchClientConfig 读取，构建官方 easysearch-client 的 EasysearchClient）
easysearch:
  host: localhost
  port: 9200
  username: admin
  # 通过环境变量注入：
  #   EASYSEARCH_PASSWORD='<密码>' mvn spring-boot:run
  password: ${EASYSEARCH_PASSWORD:}

spring:
  ai:
    model:
      embedding: none                  # 默认使用 StubEmbeddingModel；dashscope profile 会改成 openai
    vectorstore:
      easysearch:
        initialize-schema: true          # 启动时建 knn_dense_float_vector 索引
        index-name: spring-ai-easysearch-demo
        dimensions: 384                  # 必须与 StubEmbeddingModel.DIM 一致
        similarity: cosine
        model: exact                     # Demo 小数据集默认用 exact，结果更稳定；大数据可改 lsh
        l: 99
        k: 1
        candidates: 50                   # easysearch-client 的 knn_nearest_neighbors JSON 解析要求该字段存在

logging:
  level:
    com.infinilabs: debug
